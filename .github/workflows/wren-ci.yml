name: Wren SDK CI
permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    paths:
      - 'wren/**'
      - 'wren-core/**'
      - 'wren-core-py/**'
      - 'wren-core-base/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wren
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Lint
        run: |
          uvx ruff format --check src/
          uvx ruff check src/

  test-unit:
    name: unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wren
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ./wren-core-py/target/
          key: ${{ runner.os }}-cargo-wren-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build wren-core-py wheel
        working-directory: wren-core-py
        run: |
          pipx install poetry
          poetry install --no-root
          poetry run maturin build
      - name: Install dependencies
        run: |
          uv lock --find-links ../wren-core-py/target/wheels/ --upgrade-package wren-core-py
          uv sync --extra dev --find-links ../wren-core-py/target/wheels/
      - name: Run unit tests
        run: uv run pytest tests/unit/ -v -m unit

  test-connector:
    name: ${{ matrix.datasource }} tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - datasource: postgres
            extra: postgres
            test_file: tests/connectors/test_postgres.py
            marker: postgres
          - datasource: mysql
            extra: mysql
            test_file: tests/connectors/test_mysql.py
            marker: mysql
    defaults:
      run:
        working-directory: wren
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install system dependencies for mysqlclient
        if: matrix.datasource == 'mysql'
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ./wren-core-py/target/
          key: ${{ runner.os }}-cargo-wren-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build wren-core-py wheel
        working-directory: wren-core-py
        run: |
          pipx install poetry
          poetry install --no-root
          poetry run maturin build
      - name: Install dependencies
        run: |
          uv lock --find-links ../wren-core-py/target/wheels/ --upgrade-package wren-core-py
          uv sync --extra ${{ matrix.extra }} --extra dev --find-links ../wren-core-py/target/wheels/
      - name: Run ${{ matrix.datasource }} tests
        run: uv run pytest ${{ matrix.test_file }} -v -m ${{ matrix.marker }}
