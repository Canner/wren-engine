name: Build ibis image
permissions:
  contents: write
  packages: write
  pull-requests: write

on:
  push:
    branches:
      - main
    paths:
      - 'ibis-server/**'
      - 'wren-core/**'
      - 'wren-core-base/**'
      - 'wren-core-py/**'
      - 'mcp-server/**'
  workflow_dispatch:
    inputs:
      docker_image_tag_name:
        type: string
        description: Docker image tag name (Optional)
      include_arm64:
        type: boolean
        description: Include arm64 build (slower, default false)
        default: false

env:
  IBIS_IMAGE: ghcr.io/canner/wren-engine-ibis

jobs:
  prepare-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare tag name
        id: prepare_tag
        env:
          DOCKER_IMAGE_TAG_NAME: ${{ github.event.inputs.docker_image_tag_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "type=sha" > tags.txt
            mcp_version="sha-$(git rev-parse --short HEAD)"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "$DOCKER_IMAGE_TAG_NAME" ]; then
              if ! echo "$DOCKER_IMAGE_TAG_NAME" | grep -qE '^[A-Za-z0-9_][A-Za-z0-9_.-]*$'; then
                echo "Invalid docker_image_tag_name: must start with [A-Za-z0-9_] and contain only [A-Za-z0-9_.-]" >&2
                exit 1
              fi
              if [ "${#DOCKER_IMAGE_TAG_NAME}" -gt 128 ]; then
                echo "docker_image_tag_name exceeds 128 characters" >&2
                exit 1
              fi
              tag_name="$DOCKER_IMAGE_TAG_NAME"
            else
              tag_name=$(echo "$REF_NAME" | sed 's/[^a-zA-Z0-9]/-/g')-$(git rev-parse --short HEAD)
            fi
            echo "type=raw,value=$tag_name" > tags.txt
            mcp_version="$tag_name"
          fi
          echo "tags=$(cat tags.txt)" >> $GITHUB_OUTPUT
          printf 'mcp_version=%s\n' "$mcp_version" >> $GITHUB_OUTPUT
      - name: Prepare arch matrix
        id: prepare_arch
        run: |
          archs='[{"runner":"ubuntu-latest","platform":"linux/amd64"}'
          if [ "${{ github.event_name }}" = "push" ] || \
             { [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.include_arm64 }}" = "true" ]; }; then
            archs="${archs}"',{"runner":"linux_arm64_runner","platform":"linux/arm64"}'
          fi
          archs="${archs}]"
          echo "arch=$archs" >> $GITHUB_OUTPUT
    outputs:
      tags: ${{ steps.prepare_tag.outputs.tags }}
      mcp_version: ${{ steps.prepare_tag.outputs.mcp_version }}
      arch: ${{ steps.prepare_arch.outputs.arch }}
  build-ibis-image:
    needs: prepare-tag
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(needs.prepare-tag.outputs.arch) }}
    runs-on: ${{ matrix.arch.runner }}
    steps:
      - name: Prepare platform
        run: |
          platform=${{ matrix.arch.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
      - uses: actions/checkout@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IBIS_IMAGE }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.arch.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          context: ./ibis-server
          build-args: |
            MCP_SERVER_VERSION=${{ needs.prepare-tag.outputs.mcp_version }}
          build-contexts: |
            wren-core-py=./wren-core-py
            wren-core=./wren-core
            wren-core-base=./wren-core-base
            mcp-server=./mcp-server
          outputs: type=image,name=${{ env.IBIS_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
  merge:
    runs-on: ubuntu-latest
    needs: [ prepare-tag, build-ibis-image ]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IBIS_IMAGE }}
          tags: |
            ${{ needs.prepare-tag.outputs.tags }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          TAGS=$(echo "${{ steps.meta.outputs.tags }}" | awk '{printf "--tag %s ", $0}')
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IBIS_IMAGE }}@sha256:%s ' *) \
            $TAGS
      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ steps.meta.outputs.tags }}
