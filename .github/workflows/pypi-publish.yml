name: Publish wren-core-py to PyPI

permissions:
  contents: read
  id-token: write  # Required for trusted publishing (OIDC)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  build-wheels:
    name: Build wheel — ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # TODO: Linux aarch64 disabled — ring 0.17+ cross-compilation fails (__ARM_ARCH undefined)
          # Ref: https://github.com/PyO3/maturin-action/issues/222
          # - os: ubuntu-24.04-arm
          #   target: aarch64-unknown-linux-gnu
          #   manylinux: 2_28
          # macOS x86_64
          - os: macos-15-intel
            target: x86_64-apple-darwin
          # macOS arm64
          - os: macos-15
            target: aarch64-apple-darwin
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          working-directory: wren-core-py
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: wren-core-py/dist/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: wren-core-py
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: wren-core-py/dist/*.tar.gz

  publish:
    name: Publish to ${{ github.event.inputs.target || 'testpypi' }}
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.target || 'testpypi' }}
      url: ${{ github.event.inputs.target == 'pypi' && 'https://pypi.org/project/wren-core-py/' || 'https://test.pypi.org/project/wren-core-py/' }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR dist/

      - name: Publish to ${{ github.event.inputs.target }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ github.event.inputs.target == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
          packages-dir: dist/
