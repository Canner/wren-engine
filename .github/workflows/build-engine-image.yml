name: Build engine image
permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
    paths:
      - 'wren-core-legacy/**'
  workflow_dispatch:
    inputs:
      docker_image_tag_name:
        type: string
        description: Docker image tag name (Optional)

env:
  ENGINE_IMAGE: ghcr.io/canner/wren-engine

jobs:
  prepare-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare tag name
        id: prepare_tag
        env:
          DOCKER_IMAGE_TAG_NAME: ${{ github.event.inputs.docker_image_tag_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "type=sha" > tags.txt
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "$DOCKER_IMAGE_TAG_NAME" ]; then
              if ! echo "$DOCKER_IMAGE_TAG_NAME" | grep -qE '^[A-Za-z0-9_][A-Za-z0-9_.-]*$'; then
                echo "Invalid docker_image_tag_name: must start with [A-Za-z0-9_] and contain only [A-Za-z0-9_.-]" >&2
                exit 1
              fi
              if [ "${#DOCKER_IMAGE_TAG_NAME}" -gt 128 ]; then
                echo "docker_image_tag_name exceeds 128 characters" >&2
                exit 1
              fi
              tag_name="$DOCKER_IMAGE_TAG_NAME"
            else
              tag_name=$(echo "$REF_NAME" | sed 's/[^a-zA-Z0-9]/-/g')-$(git rev-parse --short HEAD)
            fi
            echo "type=raw,value=$tag_name" > tags.txt
          fi
          echo "tags=$(cat tags.txt)" >> $GITHUB_OUTPUT
    outputs:
      tags: ${{ steps.prepare_tag.outputs.tags }}
  build-image:
    needs: prepare-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Build
        working-directory: wren-core-legacy
        run: |
          ./mvnw clean install -B -DskipTests -P exec-jar
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ENGINE_IMAGE }}
          tags: |
            ${{ needs.prepare-tag.outputs.tags }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Prepare
        working-directory: wren-core-legacy
        id: prepare
        run: |
          WREN_VERSION=$(./mvnw --quiet help:evaluate -Dexpression=project.version -DforceStdout)
          cp ./wren-server/target/wren-server-${WREN_VERSION}-executable.jar ./docker
          echo "WREN_VERSION=$WREN_VERSION" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./wren-core-legacy/docker
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            WREN_VERSION=${{ steps.prepare.outputs.WREN_VERSION }}
          push: true
